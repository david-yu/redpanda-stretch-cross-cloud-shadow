# ShadowLinkConfig for `rpk shadow create -c shadow-link.yaml`, run FROM the
# shadow cluster (rp-shadow). Replicates the stretch cluster's load-test topic
# (and offsets) into the shadow cluster for DR.
#
# bootstrap_servers points at the kroxylicious proxy in rp-aws (see
# shadow/manifests/shadow-kafka-proxy*.yaml), which fronts ALL 5 stretch
# brokers and re-advertises them on the internal LB the shadow reaches over
# the VPC peering. install-shadow.sh substitutes the proxy LB hostname.
#
# Region-local: load-test leaders are pinned to the AWS rack, so data is
# fetched shadow -> LB(rp-aws) -> proxy(rp-aws) -> aws broker(rp-aws), entirely
# inside us-east-1. Only the link's small control-plane traffic to the
# gcp/azure brokers crosses clouds (via the proxy + ClusterMesh).
name: stretch-to-shadow-dr
client_options:
  bootstrap_servers:
    - "__PROXY_LB_HOSTNAME__:9192"
  connection_timeout_ms: 5000
  metadata_max_age_ms: 10000
topic_metadata_sync_options:
  interval: 15s
  auto_create_shadow_topic_filters:
    - pattern_type: LITERAL
      filter_type: INCLUDE
      name: "load-test"   # widen to '*' for full-cluster DR
  start_at_earliest: {}
  paused: false
consumer_offset_sync_options:
  interval: 30s
  paused: false
  group_filters:
    - pattern_type: LITERAL
      filter_type: INCLUDE
      name: "*"
security_sync_options:
  paused: true
